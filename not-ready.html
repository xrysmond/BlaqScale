<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlaqScale — As Expected</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root { --black:#000; --red:#9B1B2A; --red-glow:#C41230; --white:#F0EDE8; }
  html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
}

* {
  box-sizing: border-box;
}
  body {
    background:var(--black); color:var(--white);
    font-family:'Cormorant Garamond',serif;
    overflow:hidden; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:999;
  }

  .container {
    text-align:center; padding:40px 32px;
    max-width:680px; position:relative; z-index:1;
  }

  .top-line {
    width:1px; height:60px;
    background:linear-gradient(to bottom, transparent, rgba(155,27,42,0.4));
    margin:0 auto 40px;
    opacity:0; transform:scaleY(0); transform-origin:top;
    animation:lineDown 0.8s ease forwards 0.3s;
  }

  @keyframes lineDown { to { opacity:1; transform:scaleY(1); } }

  .label {
    font-family:'Cinzel',serif; font-size:clamp(9px,2vw,10px);
    letter-spacing:0.55em; color:rgba(155,27,42,0.6); margin-bottom:36px;
    display:block; opacity:0; animation:fadeUp 1s ease forwards 0.8s;
  }

  .headline {
    font-weight:300; font-size:clamp(50px,13vw,82px);
    line-height:1.02; margin-bottom:44px;
  }

  .headline .line { display:block; overflow:hidden; }

  .headline .line span {
    display:block; opacity:0; transform:translateY(105%);
    animation:lineReveal 1.1s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .headline .line:nth-child(1) span { animation-delay:1s; }
  .headline .line:nth-child(2) span {
    animation-delay:1.25s;
    color:rgba(155,27,42,0.7);
    font-style:italic;
  }

  @keyframes lineReveal { to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .copy {
    font-size:clamp(19px,4.5vw,22px); font-weight:300;
    line-height:1.9; color:rgba(240,237,232,0.38);
    max-width:520px; margin:0 auto 52px;
    opacity:0; animation:fadeUp 1.2s ease forwards 1.9s;
  }

  .btn-wrap {
    opacity:0; animation:fadeUp 1.2s ease forwards 2.4s;
  }

  .btn {
    font-family:'Cinzel',serif; font-size:clamp(10px,2.5vw,11px);
    letter-spacing:0.35em; padding:19px 52px; text-decoration:none;
    display:inline-flex; align-items:center; justify-content:center;
    background:transparent; color:rgba(240,237,232,0.4);
    border:1px solid rgba(155,27,42,0.3);
    transition:all 0.5s ease; position:relative; overflow:hidden;
  }

  .btn span { position:relative; z-index:1; }

  .btn::before {
    content:''; position:absolute; inset:0;
    background:var(--red); opacity:0; transition:opacity 0.4s ease;
  }

  .btn:hover::before { opacity:1; }
  .btn:hover { color:var(--white); border-color:var(--red); box-shadow:0 0 40px rgba(155,27,42,0.4); }

  .bottom-line {
    width:1px; height:60px;
    background:linear-gradient(to bottom, rgba(155,27,42,0.3), transparent);
    margin:44px auto 0;
    opacity:0; transform:scaleY(0); transform-origin:top;
    animation:lineDown 0.8s ease forwards 2.9s;
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-line"></div>
  <span class="label">NOT READY</span>
  <h1 class="headline">
    <span class="line"><span>As</span></span>
    <span class="line"><span>expected.</span></span>
  </h1>
  <p class="copy">
    You chose what most people choose.<br>
    What feels safe.<br><br>
    That's why most stay where they are.
  </p>
  <div class="btn-wrap">
    <a href="ready.html" class="btn"><span>PROVE OTHERWISE</span></a>
  </div>
  <div class="bottom-line"></div>
</div>
</body>
</html>
