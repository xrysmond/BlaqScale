<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlaqScale — Ready</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root { --black:#000; --red:#9B1B2A; --red-glow:#C41230; --white:#F0EDE8; }
  html, body { height:100%; }
  body {
    background:var(--black); color:var(--white);
    font-family:'Cormorant Garamond',serif;
    overflow:hidden; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
  }

  /* GRAIN */
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:999;
  }

  /* AMBIENT */
  body::after {
    content:''; position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:80vw; height:80vh;
    background:radial-gradient(ellipse, rgba(155,27,42,0.07) 0%, transparent 65%);
    pointer-events:none; z-index:0;
    animation:ambientPulse 4s ease-in-out infinite;
  }

  @keyframes ambientPulse {
    0%,100% { opacity:0.6; transform:translate(-50%,-50%) scale(0.95); }
    50%      { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
  }

  .container {
    text-align:center; padding:40px 32px;
    max-width:700px; position:relative; z-index:1;
  }

  /* TOP RED LINE */
  .top-line {
    width:1px; height:60px;
    background:linear-gradient(to bottom, transparent, var(--red));
    margin:0 auto 40px;
    opacity:0; transform:scaleY(0); transform-origin:top;
    animation:lineDown 0.8s ease forwards 0.3s;
  }

  @keyframes lineDown { to { opacity:1; transform:scaleY(1); } }

  .label {
    font-family:'Cinzel',serif; font-size:clamp(9px,2vw,10px);
    letter-spacing:0.55em; color:var(--red); margin-bottom:36px;
    display:block; opacity:0; animation:fadeUp 1s ease forwards 0.8s;
  }

  .headline {
    font-weight:300; font-size:clamp(50px,13vw,82px);
    line-height:1.02; margin-bottom:40px;
  }

  .headline .line { display:block; overflow:hidden; }

  .headline .line span {
    display:block; opacity:0; transform:translateY(105%);
    animation:lineReveal 1.1s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .headline .line:nth-child(1) span { animation-delay:1s; }
  .headline .line:nth-child(2) span { animation-delay:1.25s; color:var(--red); font-style:italic; }

  @keyframes lineReveal { to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .copy {
    font-size:clamp(19px,4.5vw,24px); font-weight:300;
    line-height:1.85; color:rgba(240,237,232,0.55);
    max-width:580px; margin:0 auto 48px;
    opacity:0; animation:fadeUp 1.2s ease forwards 2s;
  }

  .copy strong { color:var(--white); font-weight:400; }
  .copy em { color:var(--red); font-style:italic; }

  /* DIVIDER */
  .mid-line {
    width:40px; height:1px; background:var(--red);
    margin:0 auto 48px;
    opacity:0; transform:scaleX(0);
    animation:scaleIn 0.8s ease forwards 1.9s;
  }

  @keyframes scaleIn { to { opacity:1; transform:scaleX(1); } }

  .btn-wrap {
    opacity:0; animation:fadeUp 1.2s ease forwards 2.5s;
  }

  .btn {
    font-family:'Cinzel',serif; font-size:clamp(10px,2.5vw,11px);
    letter-spacing:0.38em; padding:20px 56px; text-decoration:none;
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--red); color:var(--white);
    border:1px solid var(--red);
    transition:all 0.4s ease; position:relative; overflow:hidden;
  }

  .btn span { position:relative; z-index:1; }

  .btn::before {
    content:''; position:absolute; inset:0;
    background:var(--red-glow); opacity:0; transition:opacity 0.35s ease;
  }

  .btn:hover::before { opacity:1; }
  .btn:hover { box-shadow:0 0 50px rgba(155,27,42,0.55), 0 0 100px rgba(155,27,42,0.2); }

  /* BOTTOM LINE */
  .bottom-line {
    width:1px; height:60px;
    background:linear-gradient(to bottom, var(--red), transparent);
    margin:44px auto 0;
    opacity:0; transform:scaleY(0); transform-origin:top;
    animation:lineDown 0.8s ease forwards 3s;
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-line"></div>
  <span class="label">READY</span>
  <h1 class="headline">
    <span class="line"><span>You made</span></span>
    <span class="line"><span>your decision.</span></span>
  </h1>
  <div class="mid-line"></div>
  <p class="copy">
    You're a business operator.<br>
    You already know that <em>time is money.</em><br><br>
    So don't waste more of it reading.<br>
    <strong>Contact Waeven. This is the smartest move you'll make today.</strong>
  </p>
  <div class="btn-wrap">
    <a href="https://wa.me/966563194704" class="btn" target="_blank"><span>WHATSAPP WAEVEN</span></a>
  </div>
  <div class="bottom-line"></div>
</div>
</body>
</html>
