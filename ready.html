<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ready.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        :root {
            --bg: #0a0a0a;
            --text: #f0f0f0;
            --accent: #ff0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system_ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated background grid / noise effect */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 40s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .container {
            text-align: center;
            max-width: 820px;
            padding: 0 20px;
            z-index: 2;
        }

        .decision {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.04em;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 1s forwards 0.3s;
        }

        .subtitle {
            font-size: 1.35rem;
            line-height: 1.6;
            font-weight: 400;
            max-width: 680px;
            margin: 0 auto 3.5rem;
            color: #aaaaaa;
            opacity: 0;
            animation: fadeUp 1s forwards 0.6s;
        }

        .highlight {
            color: var(--accent);
            font-weight: 600;
        }

        .button {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: var(--accent);
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 18px 42px 18px 28px;
            border-radius: 9999px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            animation: fadeUp 1s forwards 1s;
        }

        .button:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 20px 50px rgba(255, 0, 0, 0.5);
            background: #ff1a1a;
        }

        .button svg {
            width: 28px;
            height: 28px;
            transition: transform 0.4s ease;
        }

        .button:hover svg {
            transform: scale(1.15);
        }

        .final {
            margin-top: 4rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            opacity: 0;
            animation: fadeUp 1.2s forwards 1.4s;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .whatsapp-icon {
            filter: brightness(1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="decision">
            You made your decision.
        </h1>
        
        <p class="subtitle">
            And since you're a business operator.<br>
            You should already know that <span class="highlight">time is money</span>.<br>
            So don't waste more of it reading.
        </p>

    </div>
